# Production: never builds from source — uses the image published by GitHub (Docker Hub: ferdn4ndo/flora-hive).
# Override FLORA_HIVE_IMAGE to pin a release tag (same tags the release workflow pushes).
# Example: FLORA_HIVE_IMAGE=ferdn4ndo/flora-hive:0.2.0 docker compose -f docker-compose.prod.yml up -d
services:
  flora-hive:
    image: ${FLORA_HIVE_IMAGE:-ferdn4ndo/flora-hive:latest}
    container_name: flora-hive
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

networks:
  default:
    name: nginx-proxy
    external: true
