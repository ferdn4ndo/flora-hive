name: Create Release Container

on:
  release:
    types:
      - published

jobs:
  docker-image:
    name: Build and push flora-hive image
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: gacts/github-slug@v1
        id: slug

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: >
          docker build
          -t ferdn4ndo/flora-hive:latest
          --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          --build-arg BUILD_VERSION=${{ github.event.release.tag_name }}
          --build-arg VCS_REF=${GITHUB_SHA}
          .

      - name: Tag version
        run: docker tag ferdn4ndo/flora-hive:latest ferdn4ndo/flora-hive:${{ steps.slug.outputs.version }}

      - name: Push version
        run: docker push ferdn4ndo/flora-hive:${{ steps.slug.outputs.version }}

      - name: Push latest
        run: docker push ferdn4ndo/flora-hive:latest
